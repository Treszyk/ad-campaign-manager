name: CI Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-backend:
    name: Backend CI (Java 25)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        persist-credentials: true

    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build & Test Backend
      run: |
        cd backend
        ./mvnw clean test

  build-frontend:
    name: Frontend CI (Node 22)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install Dependencies
      run: |
        cd frontend
        npm ci --legacy-peer-deps

    - name: Check Formatting (Prettier)
      run: |
        cd frontend
        npm run format:check

    - name: Run Linter (ESLint)
      run: |
        cd frontend
        npm run lint

    - name: Run Frontend Tests (Angular Builder)
      run: |
        cd frontend
        npm run test -- --watch=false
